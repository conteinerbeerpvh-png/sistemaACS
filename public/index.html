<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACS Cadastro - Sistema de Cadastro para ACS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-heartbeat"></i> ACS Cadastro</h1>
            <p>Sistema de Cadastro para Agentes Comunitários de Saúde</p>
        </header>

        <main>
            <div class="card">
                <h2><i class="fas fa-user-plus"></i> <span id="formTitle">Novo Cadastro</span></h2>
                <form id="cadastroForm">
                    <input type="hidden" id="editId">
                    
                    <div class="form-group">
                        <label for="nomeCompleto">Nome Completo *</label>
                        <input type="text" id="nomeCompleto" required placeholder="Digite o nome completo">
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="dataNascimento">Data de Nascimento *</label>
                            <input type="date" id="dataNascimento" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="cpf">CPF *</label>
                            <input type="text" id="cpf" placeholder="000.000.000-00" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="telefone">Telefone *</label>
                        <input type="text" id="telefone" placeholder="(00) 00000-0000" required>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group" style="flex: 2;">
                            <label for="endereco">Endereço *</label>
                            <input type="text" id="endereco" placeholder="Rua, Avenida, etc." required>
                        </div>
                        
                        <div class="form-group" style="flex: 1;">
                            <label for="numero">Número *</label>
                            <input type="text" id="numero" placeholder="Nº" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="bairro">Bairro *</label>
                        <input type="text" id="bairro" placeholder="Digite o bairro" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="doencasPreexistentes">Doenças Pré-existentes</label>
                        <textarea id="doencasPreexistentes" rows="3" placeholder="Descreva as doenças pré-existentes (se houver)"></textarea>
                    </div>
                    
                    <div class="form-buttons">
                        <button type="submit" id="submitBtn" class="btn-primary">
                            <i class="fas fa-save"></i> Salvar Cadastro
                        </button>
                        <button type="button" id="cancelBtn" class="btn-cancel" style="display:none;" onclick="cancelarEdicao()">
                            <i class="fas fa-times"></i> Cancelar
                        </button>
                    </div>
                </form>
            </div>

            <div class="card">
                <h2><i class="fas fa-search"></i> Buscar Cadastros</h2>
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="Buscar por nome, CPF, telefone, bairro ou endereço...">
                    <button onclick="buscarCadastros()" class="btn-secondary">
                        <i class="fas fa-search"></i> Buscar
                    </button>
                    <button onclick="limparBusca()" class="btn-clear">
                        <i class="fas fa-undo"></i> Limpar
                    </button>
                </div>
                
                <div class="stats-bar" id="statsBar" style="display:none;">
                    <span id="resultCount"></span>
                </div>
                
                <div class="actions-bar">
                    <button onclick="exportarPDF()" class="btn-pdf">
                        <i class="fas fa-file-pdf"></i> Exportar PDF
                    </button>
                    <button onclick="exportarTodosPDF()" class="btn-pdf">
                        <i class="fas fa-file-pdf"></i> Exportar Todos
                    </button>
                </div>

                <div id="cadastrosList" class="cadastros-list">
                    <p style="text-align: center; color: #999;">Carregando cadastros...</p>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
